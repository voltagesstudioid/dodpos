<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="highlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bg)"/>
  
  <!-- Highlight -->
  <rect x="16" y="16" width="480" height="240" rx="112" fill="url(#highlight)"/>
  
  <!-- Shopping Cart Icon -->
  <g transform="translate(256, 280)" fill="none" stroke="white" stroke-width="24" stroke-linecap="round" stroke-linejoin="round">
    <!-- Cart body -->
    <path d="M-80,-40 L-60,-40 L-40,60 L60,60 L80,-20 L-50,-20" fill="none"/>
    <!-- Cart handle -->
    <path d="M-80,-40 L-100,-60 L-120,-60"/>
    <!-- Wheels -->
    <circle cx="-20" cy="80" r="16" fill="white" stroke="none"/>
    <circle cx="40" cy="80" r="16" fill="white" stroke="none"/>
  </g>
  
  <!-- D Letter -->
  <text x="256" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="100" font-weight="800" fill="white" text-anchor="middle">D</text>
</svg>
